<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COBE Auto-Assessor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { color: #2c3e50; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="password"], select, input[type="file"] {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;
        }
        button {
            background-color: #3498db; color: white; border: none; padding: 12px 20px;
            font-size: 16px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px;
        }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
        #downloadBtn { background-color: #27ae60; display: none; }
        #downloadBtn:hover { background-color: #2ecc71; }
        .loading { text-align: center; display: none; margin-top: 20px; font-weight: bold; color: #e67e22; }
        #reportOutput {
            margin-top: 20px; padding: 15px; background: #ecf0f1; border-left: 5px solid #3498db;
            white-space: pre-wrap; display: none; border-radius: 4px; line-height: 1.6;
        }
        .note { font-size: 0.85em; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <h1>COBE Assessment Tool</h1>
    <p style="text-align: center;">Locally processes audio and rubrics using the Gemini API.</p>

    <div class="form-group">
        <label for="apiKey">Gemini API Key (Required)</label>
        <input type="password" id="apiKey" placeholder="AIzaSy...">
        <span class="note">Your key stays in your browser and is not saved to any server.</span>
    </div>

    <div class="form-group">
        <label for="studentName">Student Name</label>
        <input type="text" id="studentName" placeholder="e.g., Yossi Cohen">
    </div>

    <div class="form-group">
        <label for="level">Exam Level</label>
        <select id="level">
            <option value="4">4 Points (016486)</option>
            <option value="5">5 Points (016586)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="topic">Video Topic</label>
        <input type="text" id="topic" placeholder="e.g., Making Snow">
    </div>

    <div class="form-group">
        <label for="audioFile">1. Upload Student Audio (.webm, .mp3, .m4a, .wav)</label>
        <input type="file" id="audioFile" accept="audio/*">
    </div>

    <div class="form-group">
        <label for="pdfFile">2. Upload Rubric (PDF)</label>
        <input type="file" id="pdfFile" accept="application/pdf">
    </div>

    <div class="form-group">
        <label for="csvFile">3. Upload Questions (CSV)</label>
        <input type="file" id="csvFile" accept=".csv">
    </div>

    <button id="assessBtn">Assess Student</button>
    
    <div class="loading" id="loadingIndicator">
        Analyzing Audio, CSV, and Rubric... Please wait (this takes about 30-60 seconds)...
    </div>

    <div id="reportOutput"></div>
    <button id="downloadBtn">Download Full Report</button>

</div>

<script type="importmap">
  {
    "imports": {
      "@google/generative-ai": "https://esm.run/@google/generative-ai"
    }
  }
</script>

<script type="module">
  import { GoogleGenerativeAI } from "@google/generative-ai";

  // Helper function to convert a File to Base64 (required for sending to Gemini via browser)
  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onloadend = () => {
        const base64String = reader.result.split(',')[1];
        resolve({
          inlineData: {
            data: base64String,
            mimeType: file.type
          }
        });
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // Helper function to read Text files (like CSV)
  function readFileAsText(file) {
      return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsText(file);
      });
  }

  let finalReportText = "";

  document.getElementById('assessBtn').addEventListener('click', async () => {
      const apiKey = document.getElementById('apiKey').value.trim();
      const studentName = document.getElementById('studentName').value.trim() || "Student";
      const level = document.getElementById('level').value;
      const topic = document.getElementById('topic').value.trim();
      
      const audioFile = document.getElementById('audioFile').files[0];
      const pdfFile = document.getElementById('pdfFile').files[0];
      const csvFile = document.getElementById('csvFile').files[0];

      if (!apiKey || !topic || !audioFile || !pdfFile || !csvFile) {
          alert("Please fill in all fields and upload all 3 files!");
          return;
      }

      const btn = document.getElementById('assessBtn');
      const loading = document.getElementById('loadingIndicator');
      const output = document.getElementById('reportOutput');
      const downloadBtn = document.getElementById('downloadBtn');

      btn.disabled = true;
      loading.style.display = 'block';
      output.style.display = 'none';
      downloadBtn.style.display = 'none';

      try {
          // Initialize Gemini AI
          const genAI = new GoogleGenerativeAI(apiKey);
          // Gemini 1.5 Pro is required for multi-modal (Audio + PDF + Text) reasoning
          const model = genAI.getGenerativeModel({ model: "gemini-1.5-pro" });

          // Convert files to the required formats
          const audioPart = await fileToBase64(audioFile);
          const pdfPart = await fileToBase64(pdfFile);
          const csvText = await readFileAsText(csvFile);

          // Step 3: Prompt Construction (Adding questions dynamically from CSV text)
          const prompt = `
          You are an experienced English teacher in Israel assessing a student's Oral Bagrut Exam (COBE).
          
          **Student Details:**
          - Name: ${studentName}
          - Level: ${level} Points
          - Video Topic: ${topic}
          
          **Instructions for Assessment:**
          1. **Extract Questions:** First, look at the attached CSV text data. Find the specific row for the ${level}-point level and the topic "${topic}". Extract Question 1 and Question 2 that the student was asked.
          2. **Listen to Audio:** Listen carefully to the attached audio recording of the student answering those specific questions (Part C).
          3. **Read the Rubric:** Read the attached official Ministry of Education PDF rubric. Find the specific assessment table for Part C for the ${level}-point level.
          4. **Assess:** Assess the student's audio response strictly based on that specific table's criteria and weightings.
          5. **Timing Rule:** The student must speak for a minimum of 30 seconds per answer. Apply appropriate penalties if the answers are too short or if only one question is answered.
          
          **Output Format Requirements:**
          - **Extracted Questions:** Show the two questions you found in the CSV.
          - **Transcript Summary:** A brief summary of what the student said.
          - **Criteria Breakdown:** Scores for Content, Vocabulary, Accuracy/Language, and Fluency (out of their respective maximums from the rubric). Provide a 1-sentence justification for each.
          - **Final Total Score:** /100
          - **Constructive Feedback:** 2-3 specific tips for the student to improve.
          
          Here is the CSV Data containing the questions:
          \n${csvText}\n
          `;

          // Call Gemini API with all parts (Prompt, Audio, PDF)
          const result = await model.generateContent([prompt, audioPart, pdfPart]);
          const response = await result.response;
          finalReportText = response.text();

          // Display Results
          output.innerText = finalReportText;
          output.style.display = 'block';
          downloadBtn.style.display = 'block';

      } catch (error) {
          console.error(error);
          alert("An error occurred during assessment. Check the console or your API key.");
          output.innerText = "Error: " + error.message;
          output.style.display = 'block';
      } finally {
          btn.disabled = false;
          loading.style.display = 'none';
      }
  });

  // Download Report Functionality
  document.getElementById('downloadBtn').addEventListener('click', () => {
      const studentName = document.getElementById('studentName').value.trim() || "Student";
      const blob = new Blob([finalReportText], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      
      const a = document.createElement('a');
      a.href = url;
      // Add timestamp to filename
      const date = new Date().toISOString().slice(0,10);
      a.download = `COBE_Report_${studentName}_${date}.txt`;
      
      document.body.appendChild(a);
      a.click();
      
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
  });
</script>

</body>
</html>
