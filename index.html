<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COBE Teacher Assessment Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Poppins', 'sans-serif'] },
                    colors: { brand: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 900: '#312e81' } }
                }
            }
        }
    </script>

    <style>
        body { background-color: #f3f4f6; background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 20px 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .spinner { border: 3px solid rgba(99, 102, 241, 0.2); width: 20px; height: 20px; border-radius: 50%; border-left-color: #4f46e5; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        .spinner-large { width: 40px; height: 40px; border-width: 4px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .upload-zone { transition: all 0.3s ease; }
        .upload-zone:hover { border-color: #4f46e5; background-color: #eef2ff; transform: translateY(-2px); }
        .upload-zone.has-file { border-color: #10b981; background-color: #ecfdf5; border-style: solid; }
    </style>
</head>
<body class="text-slate-700 min-h-screen py-10 px-4 sm:px-6 lg:px-8 font-sans">

    <div class="max-w-4xl mx-auto space-y-8">
        <header class="text-center space-y-4">
            <div class="inline-flex items-center justify-center p-3 bg-brand-100 rounded-2xl mb-2 shadow-sm">
                <svg class="w-8 h-8 text-brand-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
            </div>
            <h1 class="text-4xl md:text-5xl font-heading font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-brand-600 to-indigo-400 tracking-tight">
                COBE Auto-Assessor
            </h1>
            <p class="text-slate-500 text-lg max-w-2xl mx-auto">AI-powered grading for the Israeli Oral Bagrut Exam.</p>
        </header>

        <div class="glass-card p-8 md:p-10 rounded-3xl shadow-xl border border-white/50 relative overflow-hidden">
            <div class="space-y-8 relative z-10">
                <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                    <label class="block text-sm font-semibold text-slate-700 mb-2 font-heading">🔑 Gemini API Key</label>
                    <input type="password" id="apiKey" class="w-full p-3.5 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-brand-100 focus:border-brand-500 outline-none transition-all" placeholder="Paste your API key here">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2 font-heading">👤 Student Name</label>
                        <input type="text" id="studentName" class="w-full p-3.5 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-brand-100 focus:border-brand-500 outline-none transition-all" placeholder="e.g. Yossi Cohen">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2 font-heading">⭐ Exam Level</label>
                        <select id="level" class="w-full p-3.5 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-brand-100 focus:border-brand-500 outline-none transition-all appearance-none cursor-pointer">
                            <option value="4">4 Points (016486)</option>
                            <option value="5">5 Points (16586)</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2 font-heading">📺 Video Topic</label>
                    <select id="videoSelect" class="w-full p-3.5 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-brand-100 focus:border-brand-500 outline-none transition-all cursor-pointer">
                        </select>
                </div>

                <div id="dynamicUploads" class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4"></div>
            </div>
        </div>

        <div class="text-center pb-10">
            <button id="assessBtn" class="bg-gradient-to-r from-brand-600 to-indigo-600 hover:from-brand-500 hover:to-indigo-500 text-white font-heading font-bold text-lg py-4 px-12 rounded-full shadow-xl shadow-brand-500/30 transform transition hover:-translate-y-1 disabled:opacity-50 disabled:cursor-not-allowed">
                Generate AI Assessment
            </button>
            <div id="loadingIndicator" class="hidden flex flex-col items-center justify-center mt-8 bg-white/80 backdrop-blur py-4 px-6 rounded-2xl shadow-sm inline-block mx-auto max-w-sm">
                <div class="spinner spinner-large mb-3"></div>
                <p class="text-brand-900 font-semibold font-heading">AI is listening to the audio...</p>
                <p class="text-slate-500 text-sm mt-1">This takes about 30-45 seconds.</p>
            </div>
        </div>

        <div id="resultArea" class="hidden glass-card p-8 md:p-10 rounded-3xl shadow-xl border-t-8 border-brand-500 mb-20">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-slate-200 pb-5 mb-6 gap-4">
                <h2 id="resultTitle" class="text-2xl font-heading font-bold text-slate-800">Official Report Card</h2>
                <button id="downloadBtn" class="flex items-center gap-2 bg-emerald-100 text-emerald-700 hover:bg-emerald-200 py-2.5 px-5 rounded-full font-semibold transition-colors duration-200">
                    Download .txt
                </button>
            </div>
            <div class="bg-slate-50 p-6 rounded-2xl border border-slate-200">
                <pre id="reportOutput" class="whitespace-pre-wrap font-sans text-slate-700 text-[15px] leading-relaxed"></pre>
            </div>
        </div>
    </div>

    <script>
        // Global UI function to show checkmarks when files are uploaded
        window.updateFileName = function(inputId, dropzoneId, labelId, defaultText) {
            const input = document.getElementById(inputId);
            const dropzone = document.getElementById(dropzoneId);
            const label = document.getElementById(labelId);
            if (input.files && input.files.length > 0) {
                dropzone.classList.add('has-file');
                label.innerHTML = `✅ ${input.files[0].name}`;
                label.classList.replace('text-slate-700', 'text-emerald-700');
            } else {
                dropzone.classList.remove('has-file');
                label.innerHTML = defaultText;
                label.classList.replace('text-emerald-700', 'text-slate-700');
            }
        };
    </script>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        const EXAM_DATA = {
            "4": {
                "Galapagos Islands": [
                    "What two facts do we learn about the Galapagos Islands? What do we know about the Galapagos penguins? Name two things.",
                    "According to the clip, what is 'adaptation'? Explain. How have the iguanas adapted to the Galapagos Islands? Explain."
                ],
                "Rainforests": [
                    "Name three facts we learn about rainforests. What is deforestation? Explain.",
                    "Why was Kids Saving The Rainforest organization founded? Give two reasons. What have the people in this organization done? Give two examples and explain."
                ],
                "Making Snow": [
                    "What is the problem presented in the clip? According to the clip, what is the solution for this? Explain.",
                    "Can this machine be used anywhere? Explain. In your opinion, is the solution presented in the clip effective? Give an example and explain."
                ],
                "Lifeguard Dogs": [
                    "What do we know about Beacon and Bouy (Booie)? Name two things. According to the clip, what can a water rescue dog do? Give two examples.",
                    "Why are Beacon and Bouy so suitable for this job? Explain. Based on the clip you just watched, is it a good idea to have a dog on the lifeguard team? Explain."
                ],
                "Dolphins": [
                    "Name three facts we learn about dolphins. How are dolphins similar to human beings? Give two examples.",
                    "According to the clip, why is it important to protect our oceans? Explain. What is the most interesting thing you learned from this clip? Explain."
                ],
                "Kindness 101: How to Find Empathy": [
                    "Explain 'empathy' as used in the clip. List two facts about Austin.",
                    "How did Austin learn about homeless people? Explain. Describe what he does as a result."
                ]
            },
            "5": {
                "Japan: Kids Walk to School Solo": [
                    "What is surprising about the young boy's daily routine? Explain. Describe the young boy's journey to school.",
                    "Why do parents in Japan feel comfortable with this way of life? Give two examples and explain. In your opinion, would parents in Israel be comfortable with this way of life? Explain."
                ],
                "The Genius of the London Tube Map": [
                    "According to the clip, why was the original map of the London Tube complicated? Give two examples and explain. What changes occurred when Harry Beck understood that all that people wanted is to get from one station to the other? Give two examples and explain.",
                    "How do we know that Beck's Tube map became a success story? Explain. The speaker mentions three principles that should be applied in almost every design problem. Choose one and give an example of how it was applied to the map."
                ],
                "How Friendship Affects Your Brain": [
                    "Why is Priya considered a great friend? Give two examples and explain. What makes adolescent friendships so special? Give two examples and explain.",
                    "According to the clip, what is 'Theory of Mind'. How does this affect friendships in adolescence? Explain."
                ],
                "Pandas": [
                    "Describe the conservation partnership between China and the United States. According to the clip, what do we learn about pandas? Give two examples.",
                    "According to the clip, are pandas considered critically endangered? Explain. What is the most interesting thing you learned from this clip? Explain."
                ],
                "Do You Really Need 8 Hours of Sleep?": [
                    "What issue does the speaker raise at the beginning of her talk? According to the clip, is it true that people need 7-8 hours of sleep every night? Explain.",
                    "What does the speaker mean when she says that if you constantly think about your sleep it may cause more sleep problems? Explain. At the end of the clip, the speaker offers a number of suggestions. Which do you find the most useful? Explain."
                ],
                "The Power of Words": [
                    "At the beginning of the clip, the speaker makes claims that are not true. What makes people believe him? What does the speaker mean when he says, 'A simple choice of words can make a difference'. Explain.",
                    "According to the clip, how does the speaker react both times when he sees his son drawing on the wall? Which of his reactions was more effective? Explain."
                ]
            }
        };

        let finalReportText = "";
        let activeQuestions = [];

        function populateVideoDropdown(selectedLevel) {
            const select = document.getElementById('videoSelect');
            select.innerHTML = '<option value="">Select a video...</option>'; 
            
            const topics = Object.keys(EXAM_DATA[selectedLevel] || {});
            topics.forEach(vid => {
                const opt = document.createElement('option');
                opt.value = vid;
                opt.innerText = vid;
                select.appendChild(opt);
            });
            
            document.getElementById('dynamicUploads').innerHTML = `<div class="col-span-full text-center p-6 bg-slate-50 border border-slate-200 border-dashed rounded-xl text-slate-500">Please select a video topic.</div>`;
            activeQuestions = [];
        }

        document.getElementById('level').addEventListener('change', function(e) {
            populateVideoDropdown(e.target.value);
        });

        document.getElementById('videoSelect').addEventListener('change', function(e) {
            const topic = e.target.value;
            const level = document.getElementById('level').value;
            const container = document.getElementById('dynamicUploads');
            
            if (!topic) {
                container.innerHTML = `<div class="col-span-full text-center p-6 bg-slate-50 border border-slate-200 border-dashed rounded-xl text-slate-500">Please select a video topic.</div>`;
                activeQuestions = [];
                return;
            }

            activeQuestions = EXAM_DATA[level][topic] || [];
            container.innerHTML = '';
            
            activeQuestions.forEach((qText, index) => {
                const qNum = index + 1;
                const html = `
                    <div class="space-y-3 flex flex-col">
                        <div class="bg-brand-50 p-4 rounded-xl border border-brand-100 flex-grow shadow-sm">
                            <span class="text-brand-600 font-bold block mb-1">Question ${qNum}:</span>
                            <span class="text-slate-700 text-sm leading-relaxed">${qText}</span>
                        </div>
                        <label id="dropzone${qNum}" class="upload-zone flex flex-col items-center justify-center w-full h-32 border-2 border-brand-200 border-dashed rounded-2xl cursor-pointer bg-slate-50">
                            <div class="flex flex-col items-center justify-center pt-5 pb-6 text-center px-4">
                                <p class="text-sm font-semibold text-slate-700" id="label${qNum}">Upload Q${qNum} Audio</p>
                                <p class="text-xs text-slate-500 mt-1">(.webm / .mp3 / .wav)</p>
                            </div>
                            <input type="file" id="audio${qNum}" accept="audio/*,video/webm" class="hidden" onchange="window.updateFileName('audio${qNum}', 'dropzone${qNum}', 'label${qNum}', 'Upload Q${qNum} Audio')">
                        </label>
                    </div>
                `;
                container.innerHTML += html;
            });
        });

        populateVideoDropdown('4');

        function fileToGenerativePart(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => {
                    let mimeType = file.type;
                    if (!mimeType) {
                        if (file.name.endsWith('.webm')) mimeType = 'audio/webm';
                        else if (file.name.endsWith('.mp3')) mimeType = 'audio/mp3';
                        else if (file.name.endsWith('.wav')) mimeType = 'audio/wav';
                        else mimeType = 'audio/mp3'; 
                    }
                    resolve({ inlineData: { data: reader.result.split(',')[1], mimeType: mimeType } });
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        document.getElementById('assessBtn').addEventListener('click', async () => {
            const apiKey = document.getElementById('apiKey').value.trim();
            const studentName = document.getElementById('studentName').value.trim() || "Student";
            const level = document.getElementById('level').value;
            const topic = document.getElementById('videoSelect').value;

            if (!apiKey) {
                alert("Please paste your Gemini API Key first.");
                return;
            }
            if (activeQuestions.length === 0) {
                alert("Please select a Video Topic.");
                return;
            }

            let uploadedAudioParts = [];
            for (let i = 0; i < activeQuestions.length; i++) {
                const audioInput = document.getElementById(`audio${i+1}`);
                if (!audioInput || !audioInput.files[0]) {
                    alert(`Stop! You are missing the audio file for Question ${i+1}.`);
                    return;
                }
                const part = await fileToGenerativePart(audioInput.files[0]);
                uploadedAudioParts.push(part);
            }

            const btn = document.getElementById('assessBtn');
            const loading = document.getElementById('loadingIndicator');
            const resultArea = document.getElementById('resultArea');
            const resultTitle = document.getElementById('resultTitle');

            btn.disabled = true;
            loading.classList.remove('hidden');
            resultArea.classList.add('hidden');
            resultArea.classList.replace('border-red-500', 'border-brand-500'); 

            try {
                let questionsPromptString = "";
                activeQuestions.forEach((qText, index) => {
                    questionsPromptString += `\nQuestion ${index + 1}: ${qText}`;
                });

                const genAI = new GoogleGenerativeAI(apiKey);
                // We switched this back to the Pro model so it works flawlessly with your API key
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-pro" });
                
                const rubricDetails = level === '4' 
                    ? "Topic Development (60%), Vocabulary (20%), Accuracy/Language (10%), Fluency/Delivery (10%)." 
                    : "Topic Development (50%), Vocabulary (20%), Accuracy/Language (15%), Fluency/Delivery (15%).";

                const prompt = `
                You are an experienced English teacher in Israel assessing a student's Oral Bagrut Exam (COBE).
                Student Name: ${studentName} | Level: ${level} Points | Topic: ${topic}
                
                The student was asked the following ${activeQuestions.length} questions (Part C):
                ${questionsPromptString}
                
                Instructions:
                1. Listen to the attached Audio files. (Audio 1 = Question 1, Audio 2 = Question 2, etc.)
                2. Assess the student based on the official Ministry of Education weighting for ${level} points: ${rubricDetails}
                3. Provide a clear summary of the student's answers, specific scores for each of the 4 criteria, a Total Score (/100), and 2-3 actionable tips for improvement. Format the output cleanly.
                `;

                const result = await model.generateContent([prompt, ...uploadedAudioParts]);
                finalReportText = result.response.text();

                resultTitle.innerText = "Official Report Card";
                document.getElementById('reportOutput').innerText = finalReportText;
                resultArea.classList.remove('hidden');
                resultArea.scrollIntoView({ behavior: 'smooth', block: 'start' });

            } catch (error) {
                console.error(error);
                resultTitle.innerText = "❌ An Error Occurred";
                resultArea.classList.replace('border-brand-500', 'border-red-500');
                document.getElementById('reportOutput').innerText = "ERROR DETAILS:\n" + error.message;
                resultArea.classList.remove('hidden');
                resultArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } finally {
                btn.disabled = false;
                loading.classList.add('hidden');
            }
        });

        document.getElementById('downloadBtn').addEventListener('click', () => {
            if (!finalReportText) return;
            const name = document.getElementById('studentName').value.trim() || "Student";
            const topic = document.getElementById('videoSelect').value || "Topic";
            const blob = new Blob([finalReportText], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `COBE_Grade_${name}_${topic.replace(/\s+/g, '_')}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
