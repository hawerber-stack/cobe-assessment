<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COBE Teacher Assessment Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .spinner { border: 4px solid rgba(0,0,0,0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #3b82f6; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-800 p-6 md:p-12">

    <div class="max-w-5xl mx-auto space-y-8">
        <header class="text-center">
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">COBE Assessment Dashboard</h1>
            <p class="text-slate-500 mt-2">Automated Bagrut Grading via Gemini AI</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-xl font-bold mb-4 text-blue-600 border-b pb-2">1. System Setup</h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1">Gemini API Key</label>
                        <input type="password" id="apiKey" class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none" placeholder="AIzaSy...">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Upload Questions (CSV)</label>
                        <input type="file" id="csvFile" accept=".csv" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                        <p class="text-xs text-green-600 mt-1 hidden" id="csvSuccess">✓ CSV loaded. Videos populated.</p>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Upload Rubric (PDF)</label>
                        <input type="file" id="pdfFile" accept=".pdf" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-xl font-bold mb-4 text-blue-600 border-b pb-2">2. Student Files</h2>
                
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold mb-1">Student Name</label>
                            <input type="text" id="studentName" class="w-full p-2 border rounded outline-none" placeholder="e.g. Yossi">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-1">Exam Level</label>
                            <select id="level" class="w-full p-2 border rounded outline-none bg-white">
                                <option value="4">4 Points (016486)</option>
                                <option value="5">5 Points (16586)</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-1">Video Topic (Select from CSV)</label>
                        <select id="videoSelect" class="w-full p-2 border rounded outline-none bg-white" disabled>
                            <option value="">Upload CSV first to load videos...</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-1">Upload Q1 Audio (.webm)</label>
                        <input type="file" id="audio1" accept="audio/*" class="w-full text-sm">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-semibold mb-1">Upload Q2 Audio (.webm)</label>
                        <input type="file" id="audio2" accept="audio/*" class="w-full text-sm">
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center">
            <button id="assessBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                Generate Assessment
            </button>
            <div id="loadingIndicator" class="hidden flex flex-col items-center justify-center mt-6">
                <div class="spinner mb-2"></div>
                <p class="text-slate-600 font-medium">Analyzing audio files and rubric... (approx. 30-45s)</p>
            </div>
        </div>

        <div id="resultArea" class="hidden bg-white p-8 rounded-xl shadow-sm border border-slate-200">
            <div class="flex justify-between items-center border-b pb-4 mb-4">
                <h2 class="text-2xl font-bold text-slate-800">Assessment Report</h2>
                <button id="downloadBtn" class="bg-emerald-500 hover:bg-emerald-600 text-white py-2 px-4 rounded shadow font-semibold">
                    ⬇ Download Report
                </button>
            </div>
            <pre id="reportOutput" class="whitespace-pre-wrap font-sans text-slate-700 leading-relaxed"></pre>
        </div>

    </div>

    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        let csvDataRows = [];
        let finalReportText = "";

        // 1. Process CSV when uploaded to populate dropdown
        document.getElementById('csvFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            Papa.parse(file, {
                complete: function(results) {
                    csvDataRows = results.data;
                    const select = document.getElementById('videoSelect');
                    select.innerHTML = '<option value="">Select a video...</option>';
                    
                    let videosFound = new Set();

                    // Loop through CSV to find video names (usually in column 0)
                    csvDataRows.forEach(row => {
                        const videoName = row[0] ? row[0].trim() : '';
                        // Filter out headers or empty lines
                        if (videoName && videoName !== 'name of video' && videoName !== '016486 (4 points)') {
                            videosFound.add(videoName);
                        }
                    });

                    videosFound.forEach(vid => {
                        const opt = document.createElement('option');
                        opt.value = vid;
                        opt.innerText = vid;
                        select.appendChild(opt);
                    });

                    select.disabled = false;
                    document.getElementById('csvSuccess').classList.remove('hidden');
                }
            });
        });

        // Helper to convert files for Gemini
        function fileToGenerativePart(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => {
                    resolve({
                        inlineData: { data: reader.result.split(',')[1], mimeType: file.type }
                    });
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // 2. Main Assessment Logic
        document.getElementById('assessBtn').addEventListener('click', async () => {
            const apiKey = document.getElementById('apiKey').value.trim();
            const studentName = document.getElementById('studentName').value.trim() || "Student";
            const level = document.getElementById('level').value;
            const topic = document.getElementById('videoSelect').value;
            
            const pdfFile = document.getElementById('pdfFile').files[0];
            const audio1 = document.getElementById('audio1').files[0];
            const audio2 = document.getElementById('audio2').files[0];

            if (!apiKey || !topic || !pdfFile || !audio1 || !audio2 || csvDataRows.length === 0) {
                alert("Please ensure API Key, all 4 files (CSV, PDF, Audio 1, Audio 2), and Video Topic are provided!");
                return;
            }

            // UI changes while loading
            const btn = document.getElementById('assessBtn');
            const loading = document.getElementById('loadingIndicator');
            const resultArea = document.getElementById('resultArea');
            const output = document.getElementById('reportOutput');

            btn.disabled = true;
            loading.classList.remove('hidden');
            resultArea.classList.add('hidden');

            try {
                // Find Questions in the CSV
                let q1 = "Unknown Q1", q2 = "Unknown Q2";
                let foundTopic = false;
                
                for (let i = 0; i < csvDataRows.length; i++) {
                    if (csvDataRows[i][0] && csvDataRows[i][0].trim() === topic) {
                        q1 = csvDataRows[i][2] || "Not found";
                        // Q2 is usually on the next line, column 2
                        if (csvDataRows[i+1] && csvDataRows[i+1][2]) {
                            q2 = csvDataRows[i+1][2];
                        }
                        break;
                    }
                }

                const genAI = new GoogleGenerativeAI(apiKey);
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-pro" });

                const pdfPart = await fileToGenerativePart(pdfFile);
                const audio1Part = await fileToGenerativePart(audio1);
                const audio2Part = await fileToGenerativePart(audio2);

                const prompt = `
                You are an experienced English teacher in Israel assessing a student's Oral Bagrut Exam (COBE).
                
                **Student Details:**
                - Name: ${studentName}
                - Level: ${level} Points
                - Video Topic: ${topic}
                
                **Questions the student was asked:**
                Question 1: ${q1}
                Question 2: ${q2}
                
                **Instructions:**
                1. Look at the attached PDF for the official Ministry of Education Part C Rubric for ${level} points.
                2. Listen to Audio File 1 (Student's answer to Question 1).
                3. Listen to Audio File 2 (Student's answer to Question 2).
                4. Assess the student based on the official rubric. Remember: answers under 30 seconds require deductions based on the rubric.
                
                **Output Format:**
                - Include a brief summary of what the student said for each question.
                - Provide specific scores for Content, Vocabulary, Accuracy/Language, and Fluency based exactly on the rubric's point breakdown.
                - Give a Final Score out of 100.
                - Provide 2-3 specific points of constructive feedback.
                `;

                const result = await model.generateContent([prompt, pdfPart, audio1Part, audio2Part]);
                finalReportText = result.response.text();

                output.innerText = finalReportText;
                resultArea.classList.remove('hidden');

            } catch (error) {
                console.error(error);
                alert("Error: " + error.message + "\n\nMake sure your API key is correct and your files are valid.");
            } finally {
                btn.disabled = false;
                loading.classList.add('hidden');
            }
        });

        // 3. Download Report
        document.getElementById('downloadBtn').addEventListener('click', () => {
            const studentName = document.getElementById('studentName').value.trim() || "Student";
            const topic = document.getElementById('videoSelect').value || "Topic";
            
            const blob = new Blob([finalReportText], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `COBE_Grade_${studentName}_${topic.replace(/\s+/g, '_')}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
